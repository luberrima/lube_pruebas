<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nuevo test</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Unbounded:wght@700&display=swap");

:root {
  --color-main: #008e97;
  --color-main-dark: #085d7c;
  --color-main-light: #84e5ea;
  --color-secondary: #fc4c02;
  --color-secondary-dark: #700600;
  --color-white: #ffffff;
  --color-black: #002634;
  --color-bg: #fefcfb;
  --font-text: "IBM Plex Sans", sans-serif;
  --font-titles: "IBM Plex Mono", monospace;
  --font-h1: "Unbounded", sans-serif;
  --shadow: 1px 1px 24px 0 rgba(0,0,0,0.12);
  --br-big: 20px 0 20px 0;
  --br-small: 10px 0 10px 0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a6e7e 0%, #2a8a9a 30%, #f0c4a8 70%, #f5d5c0 100%);
  font-family: var(--font-text);
  padding: 1.5rem;
}

/* ── Card central ── */
.card {
  background: var(--color-white);
  border-radius: var(--br-big);
  box-shadow: var(--shadow);
  padding: 3rem 3.5rem;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  text-align: center;
}

.card-title {
  font-family: var(--font-h1);
  font-size: 2rem;
  color: var(--color-main);
  line-height: 1.2;
}

.btn-group {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 320px;
}

/* ── Botones ── */
.btn {
  width: 100%;
  padding: 14px 24px;
  font-family: var(--font-titles);
  font-size: 0.9rem;
  font-weight: 600;
  border: none;
  border-radius: var(--br-small);
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: center;
  text-decoration: none;
  display: inline-block;
}

.btn-primary {
  background: var(--color-main);
  color: var(--color-white);
}
.btn-primary:hover {
  background: var(--color-main-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(8,93,124,0.25);
}
.btn-primary:active { transform: translateY(0); box-shadow: none; }

.btn-accent {
  background: var(--color-secondary);
  color: var(--color-white);
}
.btn-accent:hover {
  background: var(--color-secondary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(252,76,2,0.28);
}
.btn-accent:active { transform: translateY(0); box-shadow: none; }

/* ── Link volver ── */
.link-volver {
  font-family: var(--font-titles);
  font-size: 0.82rem;
  color: var(--color-secondary);
  text-decoration: underline;
  cursor: pointer;
  background: none;
  border: none;
  transition: opacity 0.15s;
}
.link-volver:hover { opacity: 0.7; }

/* ══════════════════════════════
   MÓVIL (< 768px)
══════════════════════════════ */
@media (max-width: 767px) {
  body { align-items: flex-end; padding: 1rem; }

  .card {
    padding: 2.5rem 1.5rem 2rem;
    max-width: 100%;
    border-radius: 20px 0 20px 0;
  }

  .card-title { font-size: 1.5rem; }

  .btn-group { max-width: 100%; }

  .btn { padding: 16px 24px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="card">
  <h1 class="card-title">Nuevo test</h1>

  <div class="btn-group">
    <a href="configurar-test.html" class="btn btn-primary">Configurar test</a>
    <a href="#" class="btn btn-accent">Hacer un test de mi profesor</a>
  </div>

  <button class="link-volver" onclick="history.back()">Volver a inicio</button>
</div>

</body>
</html>
